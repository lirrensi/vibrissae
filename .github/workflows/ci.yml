name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Frontend tests and build
  frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Install dependencies
        working-directory: web_ui
        run: pnpm install --frozen-lockfile
        
      - name: Type check
        working-directory: web_ui
        run: pnpm type-check
        
      - name: Lint
        working-directory: web_ui
        run: pnpm lint
        
      - name: Run unit tests
        working-directory: web_ui
        run: pnpm test:unit --run
        
      - name: Build P2P
        working-directory: web_ui
        run: pnpm build:p2p
        
      - name: Build single-file
        working-directory: web_ui
        run: pnpm build:p2p:single
        
      - name: Upload P2P build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_ui/dist

  # Go server tests and build
  server:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: server/go.sum
          
      - name: Download dependencies
        working-directory: server
        run: go mod download
        
      - name: Run tests
        working-directory: server
        run: go test -v ./...
        
      - name: Build
        working-directory: server
        run: go build -v -o videochat .

  # Comprehensive E2E tests with real browser WebRTC testing
  e2e-comprehensive:
    needs: [frontend, server]
    runs-on: ubuntu-latest
    
    services:
      # Redis for potential future session management
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Install dependencies
        working-directory: web_ui
        run: pnpm install --frozen-lockfile
        
      - name: Build server
        working-directory: server
        run: go build -v -o videochat .
        
      - name: Install Playwright browsers
        working-directory: web_ui
        run: npx playwright install --with-deps chromium firefox
        
      - name: Build single-file for testing
        working-directory: web_ui
        run: pnpm build:p2p:single
        
      - name: Run comprehensive E2E tests
        working-directory: web_ui
        run: node ../scripts/run-e2e.js --mode all --reporter list
        env:
          CI: true
          PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
          
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web_ui/playwright-report/
          retention-days: 14
          
      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: web_ui/test-results/
          retention-days: 14

  # E2E tests for pull requests (quick feedback)
  e2e-quick:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Install dependencies
        working-directory: web_ui
        run: pnpm install --frozen-lockfile
        
      - name: Build server
        working-directory: server
        run: go build -v -o videochat .
        
      - name: Install Playwright browsers
        working-directory: web_ui
        run: npx playwright install --with-deps chromium
        
      - name: Build single-file
        working-directory: web_ui
        run: pnpm build:p2p:single
        
      - name: Run quick E2E tests (server mode only)
        working-directory: web_ui
        run: node ../scripts/run-e2e.js --mode server --reporter list
        env:
          CI: true
          
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-quick
          path: web_ui/playwright-report/
          retention-days: 7

  # Browser compatibility tests
  e2e-cross-browser:
    needs: [frontend]
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Install dependencies
        working-directory: web_ui
        run: pnpm install --frozen-lockfile
        
      - name: Install Playwright browsers
        working-directory: web_ui
        run: npx playwright install --with-deps ${{ matrix.browser }}
        
      - name: Build P2P mode
        working-directory: web_ui
        run: pnpm build:p2p
        
      - name: Start static server
        run: npx serve web_ui/dist -l 8080 --cors &
        
      - name: Wait for server
        run: sleep 5
        
      - name: Run cross-browser tests
        working-directory: web_ui
        run: npx playwright test --project p2p-mode-${{ matrix.browser }} --reporter list
        env:
          P2P_MODE_URL: http://localhost:8080
          
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results-${{ matrix.browser }}
          path: web_ui/playwright-report/
          retention-days: 7
