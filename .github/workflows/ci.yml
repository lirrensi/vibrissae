name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Frontend tests and build
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: web_ui
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: web_ui
        run: pnpm lint

      - name: Run unit tests
        working-directory: web_ui
        run: pnpm test:unit --run

      - name: Build P2P
        working-directory: web_ui
        run: pnpm build:p2p

      - name: Build single-file
        working-directory: web_ui
        run: pnpm build:p2p:single

      - name: Upload P2P build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_ui/dist

  # Go server tests and build
  server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: server/go.sum

      - name: Download dependencies
        working-directory: server
        run: go mod download

      - name: Run tests
        working-directory: server
        run: go test -v ./...

      - name: Build
        working-directory: server
        run: go build -tags !dev -v -o videochat .
